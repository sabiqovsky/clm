<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLM 2026 Organizational Structure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* Brand */
    --ink:#1c2433;--ink-soft:#56607a;--ink-faint:#8a93a8;
    --line:#d7d2c6;--line-soft:#e7e3da;--paper:#ffffff;--connect:#bfb9af;
    --accent:#334155;
    /* Region */
    --ID:#2563eb;--PH:#e11d48;--MY:#ea580c;--TH:#0f9d8a;--CN:#7c3aed;--RG:#0e7490;--PL:#5b6472;--DD:#5b6472;
    /* Card roles */
    --c-apex-bg:#0f172a;      --c-apex-border:#334155;
    --c-head-bg:#1e3a5f;
    --c-lead-bg:#0f6b7a;
    --c-lead-title:#a8d8df;
    --c-head-title:#a8c4e0;
    --c-white-title:#56607a;
    --c-white-name:#1c2433;
    --c-pill-dark-bg:rgba(0,0,0,.3);
    --c-pill-light-bg:#dde1e7;--c-pill-light-border:#c4cad4;--c-pill-light-text:#3d4a5c;
    /* Layout */
    --card-pad-x:15px;
    --card-radius:9px;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#ece8e0;
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;
    padding:40px 24px 64px;
    display:flex;justify-content:center;
    min-height:100vh;
  }
  .page{
    width:1360px;
    background:var(--paper);border-radius:4px;
    box-shadow:0 2px 16px rgba(40,33,20,.13);
    padding:52px 56px 56px;
  }
  .masthead{
    display:flex;align-items:flex-end;justify-content:space-between;gap:32px;
    padding-bottom:22px;border-bottom:1.5px solid var(--ink);margin-bottom:40px;
  }
  .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 8px;}
  .title{font-size:33px;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.02;}
  .title span{color:var(--ink-faint);font-weight:600;}
  .legend{display:flex;flex-wrap:wrap;gap:7px 14px;max-width:430px;justify-content:flex-end;}
  .leg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--ink-soft);white-space:nowrap;}
  .leg .swatch{width:11px;height:11px;border-radius:3px;flex:none;}
  .nav{font-size:12px;font-weight:600;color:var(--ink-soft);}
  .nav a{color:var(--ink);text-decoration:none;border-bottom:1.5px solid var(--ink);}
  .nav a:hover{color:var(--ink-soft);}

  .chart-wrap{overflow-x:auto;overflow-y:visible;padding-bottom:8px;}
  #chart-canvas{position:relative;display:block;}

  /* ---- Card base ---- */
  .ocard{
    position:absolute;border-radius:var(--card-radius);overflow:hidden;
    background:var(--paper);border:1px solid var(--line-soft);
    box-shadow:0 1px 4px rgba(28,36,51,.07);
    cursor:default;
    transition:opacity .22s,filter .22s,box-shadow .15s,transform .15s;
  }
  .ocard:hover{box-shadow:0 4px 14px rgba(28,36,51,.16);transform:translateY(-1px);z-index:10;}
  .ocard .top-strip{height:3px;width:100%;}
  .ocard .ci{padding:9px var(--card-pad-x) 10px;text-align:center;}
  .ocard .ce{font-size:8.5px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;margin-bottom:4px;line-height:1.35;white-space:nowrap;color:var(--c-white-title);}
  .ocard .cn{font-size:12px;font-weight:800;letter-spacing:-.01em;line-height:1.25;white-space:nowrap;color:var(--c-white-name);}
  .ocard .cpt{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;width:max-content;margin-left:auto;margin-right:auto;}
  .ocard .cpill{display:inline-flex;align-items:center;font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:4px;padding:2px 5px;line-height:1.2;}

  /* Dark cards override text colors */
  .ocard.l0,.ocard.l1,.ocard.l2-lead{border:none;}
  .ocard.l0 .ce,.ocard.l1 .ce,.ocard.l2-lead .ce{color:var(--c-head-title);}
  .ocard.l0 .cn,.ocard.l1 .cn,.ocard.l2-lead .cn{color:var(--paper);}

  /* Per-level backgrounds (via CSS; JS inline style overrides for leads) */
  .ocard.l0{background:var(--c-apex-bg);border:2px solid var(--c-apex-border);box-shadow:0 6px 24px rgba(15,23,42,.4);}
  .ocard.l0 .ce{color:var(--ink-faint);}
  .ocard.l0 .cn{font-size:16px;}
  .ocard.l1{background:var(--c-head-bg);}
  .ocard.l1 .cn{font-size:14px;}
  .ocard.l2-lead{background:var(--c-lead-bg);}
  .ocard.l2-lead .ce{color:var(--c-lead-title);}
  /* All white cards identical */
  .ocard.l2-direct,.ocard.l3{background:var(--paper);border:1px solid var(--line-soft);}
  .ocard.l3 .cn{font-size:11.5px;}
  /* Pills — colors set via inline style in pillHtml() */

  /* tweak: color off */
  body[data-color="off"] .ocard.l2-lead{background:var(--c-lead-bg)!important;}
  body[data-color="off"] .ocard.l2-lead .cpill{color:var(--paper);background:var(--c-pill-dark-bg);}
  body[data-color="off"] .top-strip{background:var(--accent)!important;}

  /* tweak: focus region */
  body[data-focus="ID"]  .ocard[data-region]:not([data-region~="ID"]),
  body[data-focus="PH"]  .ocard[data-region]:not([data-region~="PH"]),
  body[data-focus="MY"]  .ocard[data-region]:not([data-region~="MY"]),
  body[data-focus="TH"]  .ocard[data-region]:not([data-region~="TH"]),
  body[data-focus="CN"]  .ocard[data-region]:not([data-region~="CN"]),
  body[data-focus="RG"]  .ocard[data-region]:not([data-region~="RG"]),
  body[data-focus="PL"]  .ocard[data-region]:not([data-region~="PL"]){opacity:.15;filter:saturate(.2);}

  /* tweak: compact density */
  body[data-density="compact"] .ocard .ci{padding:6px 9px 7px;}
  body[data-density="compact"] .ocard .cn{font-size:11px!important;}
  body[data-density="compact"] .ocard .ce{font-size:8px;margin-bottom:2px;}
  body[data-density="compact"] .ocard .cpt{margin-top:3px;gap:2px;}
  body[data-density="compact"] .ocard .cpill{font-size:8px;padding:1px 4px;}

  .dl-bar{display:flex;gap:8px;margin-top:16px;}
  .dl-btn{display:inline-flex;align-items:center;gap:6px;font:700 11px/1 'Plus Jakarta Sans',sans-serif;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:6px;border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;transition:background .15s,color .15s;}
  .dl-btn:hover{background:var(--ink);color:#fff;}
  .footnote{
    margin-top:36px;padding-top:14px;border-top:1px solid var(--line-soft);
    font-size:10.5px;color:var(--ink-faint);
    display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;
  }
  .scroll-hint{font-size:10px;color:var(--ink-faint);text-align:right;margin-top:6px;letter-spacing:.04em;}

  @page{size:A3 landscape;margin:10mm;}
  @media print{
    body{background:#fff;padding:0;}
    .page{box-shadow:none;border-radius:0;padding:0;display:block;}
    #tweaks-root{display:none!important;}
    .chart-wrap{overflow:visible;}
    #chart-canvas{transform:scale(.44);transform-origin:top left;}
    .scroll-hint{display:none;}
    .ocard,.top-strip{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>

<script>
(function(){

/* ---- DATA ---- */
var RCOLS  = {PL:'#5b6472',DD:'#5b6472'};
var RLABEL = {PL:'Pool',DD:'Dedicated'};

var ORG = {name:'Shing Kwan Tan',lv:0,ey:'Head of Customer Lifecycle Management',rg:[],ch:[
  {name:'Dinan',lv:1,ey:'Head of Customer Implementations',rg:[],ch:[
    {name:'Janet',lv:2,lead:true,ey:'Customer Implementations Lead',rg:[],ch:[
      {name:'Dionne Aurelia',lv:3,ey:'Customer Implementations Manager',rg:[],ch:[]},
      {name:'Dianne Cabrera',lv:3,ey:'Customer Implementations Manager',rg:[],ch:[]}
    ]},
    {name:'Eric Len',lv:2,lead:true,ey:'Customer Implementations Lead',rg:[],ch:[
      {name:'Silitha (Tob) Kasiwong',lv:3,ey:'Customer Implementations Manager',rg:[],ch:[]},
      {name:'Hamizah Hayat',lv:3,ey:'Customer Implementations Manager',rg:[],ch:[]}
    ]},
    {name:'Gabriel Sihombing (Gabs)',lv:2,lead:false,ey:'Customer Implementations Manager',rg:[],ch:[]},
    {name:'Nina Rasmeika Pratiwi',lv:2,lead:false,ey:'Customer Implementations Manager',rg:[],ch:[]},
    {name:'Askar Sabiq',lv:2,ey:'Automation & Analytics',rg:[],ch:[]}
  ]},
  {name:'Clory Pienarso',lv:1,ey:'Head of Customer Success',rg:['DD'],ch:[
    {name:'Putri Erfiasany',lv:2,lead:true,ey:'Customer Success Lead',rg:['DD'],ch:[
      {name:'Fergie Iswandi',lv:3,ey:'Customer Success Manager',rg:['DD'],ch:[]},
      {name:'Sarah Mutia',lv:3,ey:'Customer Success Manager',rg:['DD'],ch:[]},
      {name:'Rahmadika Kampai',lv:3,ey:'Customer Success Manager',rg:['DD'],ch:[]}
    ]},
    {name:'May Cruz',lv:2,lead:true,ey:'Customer Success Lead',rg:['DD'],ch:[
      {name:'Cherry Mijares',lv:3,ey:'Customer Success Manager',rg:['DD'],ch:[]},
      {name:'Claudia Liwanag',lv:3,ey:'Customer Success Manager',rg:['DD'],ch:[]}
    ]},
    {name:'Jenny Lu',lv:2,lead:false,ey:'Customer Success Manager',rg:['DD'],ch:[]},
    {name:'Syuhada Sipayung',lv:2,lead:false,ey:'Customer Success Manager',rg:['DD'],ch:[]},
    {name:'Candice Lee',lv:2,lead:false,ey:'Customer Success Manager',rg:['DD'],ch:[]}
  ]},
  {name:'David Setyawan',lv:1,lead:true,ey:'Customer Success Lead',rg:['PL'],ch:[
    {name:'Wynona Lamiraj',lv:2,ey:'Customer Success Manager',rg:['PL'],ch:[]},
    {name:'Ridzeki Akbar',lv:2,ey:'Customer Success Manager',rg:['PL'],ch:[]},
    {name:'Faira Yenita',lv:2,ey:'Customer Success Manager',rg:['PL'],ch:[]},
    {name:'Rachel Diercie',lv:2,ey:'Customer Success Manager',rg:['PL'],ch:[]}
  ]}
]};

/* ---- LAYOUT CONSTANTS ---- */
var CW = 225, CH = 100, HG = 24, VG = 100, PAD = 44;

/* subtree width */
function sw(n) {
  if (!n.ch || !n.ch.length) return CW;
  var tot = n.ch.reduce(function(s,c){ return s + sw(c); }, 0);
  return Math.max(CW, tot + (n.ch.length - 1) * HG);
}

/* layout: place nodes, store connections for second pass */
var placements = [];   /* [{n, cx, y, idx}] */
var connections = [];  /* [{pidx, pcx, py, ccxs, childY}] */

function lay(n, cx, y) {
  var myIdx = placements.length;
  n._pidx = myIdx;
  placements.push({n:n, cx:cx, y:y});
  if (!n.ch || !n.ch.length) return;
  var childY = y + CH + VG;
  var tot = n.ch.reduce(function(s,c){ return s + sw(c); }, 0) + (n.ch.length - 1) * HG;
  var x0 = cx - tot / 2;
  var ccxs = n.ch.map(function(c){
    var cw = sw(c), ccx = x0 + cw / 2;
    x0 += cw + HG;
    return ccx;
  });
  connections.push({pidx:myIdx, pcx:cx, py:y, ccxs:ccxs, childY:childY});
  n.ch.forEach(function(c, i){ lay(c, ccxs[i], childY); });
}

lay(ORG, sw(ORG) / 2 + PAD, PAD);

var maxX = Math.max.apply(null, placements.map(function(p){ return p.cx + CW / 2; })) + PAD;
var estMaxY = Math.max.apply(null, placements.map(function(p){ return p.y; })) + CH + VG + PAD;

/* ---- CARD HELPERS ---- */
function cardCls(n) {
  if (n.lv === 0) return 'ocard l0';
  if (n.lv === 1) return 'ocard l1';
  if (n.lv === 2) return n.lead ? 'ocard l2-lead' : 'ocard l2-direct';
  return 'ocard l3';
}
function cardBgStyle(n) {
  if (n.lv === 2 && n.lead) return 'background:#0f6b7a;';
  return '';
}
function pillHtml(r, n) {
  var darkCard = n.lv === 0 || n.lv === 1 || (n.lv === 2 && n.lead);
  var st = darkCard
    ? 'color:#ffffff;background:rgba(0,0,0,.3);'
    : 'color:#3d4a5c;background:#dde1e7;border:1px solid #c4cad4;';
  return '<span class="cpill" style="' + st + '">' + (RLABEL[r]||r) + '</span>';
}
function renderCard(p, idx) {
  var n = p.n, cx = p.cx, y = p.y;
  var lx = Math.round(cx), ly = Math.round(y);
  var bgStyle = cardBgStyle(n);
  var strip = '';
  var drAttr = n.rg.length ? ' data-region="' + n.rg.join(' ') + '"' : '';
  var pills = n.rg.map(function(r){ return pillHtml(r, n); }).join('');
  var pillsRow = pills ? '<div class="cpt">' + pills + '</div>' : '';
  return '<div class="' + cardCls(n) + '" data-pidx="' + idx + '" style="left:' + lx + 'px;top:' + ly + 'px;width:max-content;transform:translateX(-50%);' + bgStyle + '"' + drAttr + '>' +
    strip + '<div class="ci"><div class="ce">' + (n.ey||'') + '</div><div class="cn">' + n.name + '</div>' + pillsRow + '</div></div>';
}

/* ---- PASS 1: Render cards with estimated positions ---- */
var canvas = document.getElementById('chart-canvas');
canvas.style.width  = maxX + 'px';
canvas.style.height = estMaxY + 'px';
canvas.innerHTML = placements.map(function(p, i){ return renderCard(p, i); }).join('');

/* ---- PASS 2: Measure actual dimensions ---- */
var actualH = placements.map(function(_, i){
  var el = canvas.querySelector('[data-pidx="' + i + '"]');
  return el ? el.offsetHeight : CH;
});
var actualW = placements.map(function(_, i){
  var el = canvas.querySelector('[data-pidx="' + i + '"]');
  return el ? el.offsetWidth : CW;
});

/* ---- PASS 3: Recompute layout with actual widths ---- */
placements = []; connections = [];

/* max card height per level — ensures all rows align */
var maxHByLevel = {};
placements.forEach && void 0; /* placements already reset */
(function collectH(n){ 
  var h = actualH[n._pidx];
  maxHByLevel[n.lv] = Math.max(maxHByLevel[n.lv]||0, h);
  (n.ch||[]).forEach(collectH);
})(ORG);

function swActual(n) {
  var w = actualW[n._pidx] || CW;
  if (!n.ch || !n.ch.length) return w;
  var tot = n.ch.reduce(function(s,c){ return s + swActual(c); }, 0);
  return Math.max(w, tot + (n.ch.length - 1) * HG);
}
function layActual(n, cx, y) {
  var myIdx = placements.length;
  n._pidx2 = myIdx;
  placements.push({n:n, cx:cx, y:y});
  if (!n.ch || !n.ch.length) return;
  var childY = y + (maxHByLevel[n.lv] || actualH[n._pidx]) + VG;
  var tot = n.ch.reduce(function(s,c){ return s + swActual(c); }, 0) + (n.ch.length - 1) * HG;
  var x0 = cx - tot / 2;
  var ccxs = n.ch.map(function(c){
    var cw = swActual(c), ccx = x0 + cw / 2;
    x0 += cw + HG;
    return ccx;
  });
  var childPidxs = [];
  n.ch.forEach(function(c, i){
    childPidxs.push(placements.length);
    layActual(c, ccxs[i], childY);
  });
  connections.push({pidx:myIdx, pcx:cx, py:y, ccxs:ccxs, childY:childY, childPidxs:childPidxs});

}

layActual(ORG, swActual(ORG) / 2 + PAD, PAD);

/* Reposition cards to actual positions */
placements.forEach(function(p, i){
  var el = canvas.querySelector('[data-pidx="' + (p.n._pidx) + '"]');
  if (el) { el.style.left = Math.round(p.cx) + 'px'; el.style.top = Math.round(p.y) + 'px'; }
});

/* Sync connector coords to actual placed cx/cy */
connections.forEach(function(conn){
  conn.pcx = Math.round(placements[conn.pidx].cx);
  conn.py  = placements[conn.pidx].y;
  conn.ccxs = conn.childPidxs.map(function(idx){ return Math.round(placements[idx].cx); });
});

var newMaxX = Math.max.apply(null, placements.map(function(p, i){ return p.cx + actualW[p.n._pidx] / 2; })) + PAD;
var trueMaxY = Math.max.apply(null, placements.map(function(p, i){ return p.y + actualH[p.n._pidx]; })) + PAD + 30;
canvas.style.width = newMaxX + 'px';
canvas.style.height = trueMaxY + 'px';

/* compute edges */
var STEM = 20; /* fixed distance above child row for the bus line */
var edges = [];
connections.forEach(function(conn){
  var parentNode = placements[conn.pidx].n;
  var pBottom = conn.py + (maxHByLevel[parentNode.lv] || actualH[parentNode._pidx]);
  var busY = Math.round(conn.childY - STEM);
  /* stem: parent card bottom → bus */
  edges.push([conn.pcx, pBottom, conn.pcx, busY]);
  /* horizontal bus */
  if (conn.ccxs.length > 1)
    edges.push([conn.ccxs[0], busY, conn.ccxs[conn.ccxs.length - 1], busY]);
  /* vertical drops → each child top */
  conn.ccxs.forEach(function(ccx){
    edges.push([ccx, busY, ccx, conn.childY]);
  });
});

/* build SVG */
var NS = 'http://www.w3.org/2000/svg';
var svgEl = document.createElementNS(NS, 'svg');
svgEl.style.cssText = 'position:absolute;inset:0;width:' + newMaxX + 'px;height:' + trueMaxY + 'px;pointer-events:none;overflow:visible;';
svgEl.setAttribute('viewBox', '0 0 ' + newMaxX + ' ' + trueMaxY);
edges.forEach(function(e){
  var line = document.createElementNS(NS, 'line');
  line.setAttribute('x1', e[0].toFixed(1)); line.setAttribute('y1', e[1].toFixed(1));
  line.setAttribute('x2', e[2].toFixed(1)); line.setAttribute('y2', e[3].toFixed(1));
  line.setAttribute('stroke', 'var(--connect)');
  line.setAttribute('stroke-width', '1.5');
  line.setAttribute('stroke-linecap', 'round');
  svgEl.appendChild(line);
});
canvas.insertBefore(svgEl, canvas.firstChild);

/* center scroll */
var headCX = sw(ORG) / 2 + PAD;
setTimeout(function(){
  var wrap = document.querySelector('.chart-wrap');
  wrap.scrollLeft = Math.max(0, Math.round(headCX - wrap.clientWidth / 2));
}, 30);

})();
</script>

<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
/* Pre-fetch Google Font as blob and inject inline @font-face so html2canvas can render it */
var _fontReady = null;
function ensureFont() {
  if (_fontReady) return _fontReady;
  _fontReady = fetch('https://fonts.gstatic.com/s/plusjakartasans/v12/LDIoaomQNQcsA88c7O9yZ4KMCoOg4Ko20yygg_vb.woff2')
    .then(function(r){ return r.arrayBuffer(); })
    .then(function(buf){
      var b64 = btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
      var style = document.createElement('style');
      style.id = 'font-inline';
      style.textContent = '@font-face{font-family:"Plus Jakarta Sans";font-weight:100 900;src:url(data:font/woff2;base64,' + b64 + ') format("woff2");}';
      document.head.appendChild(style);
    }).catch(function(){ /* fallback: use system font */ });
  return _fontReady;
}

function captureCanvas(elId, callback) {
  ensureFont().then(function(){
    return document.fonts.ready;
  }).then(function(){
    var el = document.getElementById(elId);
    var w = el.scrollWidth, h = el.scrollHeight;
    return html2canvas(el, {
      scale:4, useCORS:true, allowTaint:false, logging:false,
      width:w, height:h, windowWidth:w, windowHeight:h, scrollX:0, scrollY:0
    });
  }).then(callback);
}

function downloadChart(fmt) {
  captureCanvas('chart-canvas', function(canvas) {
    if (fmt === 'png') {
      var a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'clm-org-chart.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } else if (fmt === 'svg') {
      var iw=canvas.width, ih=canvas.height, img=canvas.toDataURL('image/png');
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+iw+'" height="'+ih+'"><image href="'+img+'" width="'+iw+'" height="'+ih+'"/></svg>';
      var a = document.createElement('a');
      a.href='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      a.download='clm-org-chart.svg';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } else {
      convertViaServer(canvas.toDataURL('image/png'), fmt, 'clm-org-chart');
    }
  });
}

function convertViaServer(dataUrl, fmt, filename) {
  var btn = event.target;
  btn.disabled = true; btn.textContent = 'Converting…';
  fetch('/api/convert', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({image: dataUrl, format: fmt, filename: filename})
  }).then(function(res) {
    if (!res.ok) return res.json().then(function(e){ throw new Error(e.error); });
    return res.blob();
  }).then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename + '.' + fmt;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }).catch(function(err) {
    alert('Conversion failed: ' + err.message);
  }).finally(function() {
    btn.disabled = false; btn.textContent = '\u2193 Download ' + fmt.toUpperCase();
  });
}
</script>
<!-- React + Babel for Tweaks panel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const ORG_TWEAK_DEFAULTS = {density:"comfortable",colorLeads:true,showLegend:true,focus:"all",accent:"#334155"};
function OrgTweaks(){
  const [t,setTweak]=useTweaks(ORG_TWEAK_DEFAULTS);
  React.useEffect(()=>{
    const b=document.body;
    b.dataset.density=t.density;
    b.dataset.color=t.colorLeads?"on":"off";
    b.dataset.focus=t.focus;
    document.documentElement.style.setProperty('--accent',t.accent);
    const lg=document.querySelector('.legend');
    if(lg)lg.style.display=t.showLegend?'':'none';
  },[t]);
  return(
    <TweaksPanel title="Tweaks">
      <TweakSection label="Layout"/>
      <TweakRadio label="Density" value={t.density} options={['comfortable','compact']} onChange={v=>setTweak('density',v)}/>
      <TweakToggle label="Region legend" value={t.showLegend} onChange={v=>setTweak('showLegend',v)}/>
      <TweakSection label="Color coding"/>
      <TweakToggle label="Color leads by region" value={t.colorLeads} onChange={v=>setTweak('colorLeads',v)}/>
      <TweakSelect label="Focus region" value={t.focus}
        options={[
          {value:'all',label:'All regions'},
          {value:'ID',label:'ID · Indonesia'},
          {value:'PH',label:'PH · Philippines'},
          {value:'MY',label:'MY · Malaysia'},
          {value:'TH',label:'TH · Thailand'},
          {value:'CN',label:'CN · China'},
          {value:'RG',label:'Regional'},
          {value:'PL',label:'Pool'}
        ]}
        onChange={v=>setTweak('focus',v)}/>
      <TweakSection label="Accent"/>
      <TweakColor label="Neutral color" value={t.accent} options={['#334155','#1e293b','#3730a3','#0f766e']} onChange={v=>setTweak('accent',v)}/>
    </TweaksPanel>
  );
}
ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<OrgTweaks/>);
</script>
</body>
